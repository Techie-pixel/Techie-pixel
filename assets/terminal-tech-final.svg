        <tspan fill="#FFCA28">[Firebase]</tspan>  <tspan fill="#FFA000">[Firestore]</tspan>  <tspan fill="#4479A1">[MySQL]</tspan>  <tspan fill="#D22128">[Apache]</tspan>
      </text>
