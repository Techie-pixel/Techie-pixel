      <text y="60" class="bl" font-weight="bold" xml:space="preserve">    тХЪтХРтХРтЦИтЦИтХФтХРтХРтХЭтЦИтЦИтХФтХРтХРтХРтХРтХЭтЦИтЦИтХФтХРтХРтХРтХРтХЭтЦИтЦИтХС  тЦИтЦИтХС    тЦИтЦИтХФтХРтХРтХРтХРтХЭтХЪтХРтХРтЦИтЦИтХФтХРтХРтХЭ</text>
      <text y="85" class="bl" font-weight="bold" xml:space="preserve">       тЦИтЦИтХС   тЦИтЦИтЦИтЦИтЦИтХЧ  тЦИтЦИтХС     тЦИтЦИтЦИтЦИтЦИтЦИтЦИтХС    тЦИтЦИтЦИтЦИтЦИтЦИтЦИтХЧ   тЦИтЦИтХС   </text>
      <text y="110" class="bl" font-weight="bold" xml:space="preserve">       тЦИтЦИтХС   тЦИтЦИтХФтХРтХРтХЭ  тЦИтЦИтХС     тЦИтЦИтХФтХРтХРтЦИтЦИтХС    тХЪтХРтХРтХРтХРтЦИтЦИтХС   тЦИтЦИтХС   </text>
