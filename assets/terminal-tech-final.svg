<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 510" width="850" height="510">
  <defs>
    <style>
      .pr { fill: #79c0ff; font-weight: bold; }
      .pt { fill: #ff7b72; }
      .cm { fill: #d2a8ff; font-weight: bold; }
      .gn { fill: #39ff14; font-weight: bold; }
      .bl { fill: #58a6ff; font-weight: bold; }
      .cursor { fill: #39ff14; font-weight: bold; }
    </style>
  </defs>

  <rect width="850" height="510" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <rect width="850" height="35" rx="12" fill="#161b22"/>
  <rect width="850" height="10" y="25" fill="#161b22"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>
  <text x="360" y="23" fill="#8b949e" font-family="ui-monospace, Consolas, monospace" font-size="13">python@aditya-engine: ~</text>

  <g transform="translate(20, 70)" font-family="ui-monospace, Consolas, monospace" font-size="15px" fill="#8b949e">
    
    <!-- Command line -->
    <g opacity="0">
      <text y="0"><tspan class="pr">aditya@dev</tspan>:<tspan class="pt">~/desktop</tspan>$ <tspan class="cm">python tech_stack.py --display</tspan></text>
      <rect x="220" y="-14" width="630" height="18" fill="#0d1117">
        <animate attributeName="x" values="220; 220; 850; 850; 220; 220" keyTimes="0; 0.02; 0.08; 0.95; 0.96; 1" dur="20s" repeatCount="indefinite"/>
      </rect>
      <animate attributeName="opacity" values="0; 1; 1; 0; 0" keyTimes="0; 0.01; 0.95; 0.96; 1" dur="20s" repeatCount="indefinite"/>
    </g>

    <!-- ASCII Art Banner -->
    <g opacity="0">
