      <text y="160" class="bl" font-weight="bold" xml:space="preserve">       тХЪтХРтХЭ   тХЪтХРтХРтХРтХРтХРтХРтХЭ тХЪтХРтХРтХРтХРтХРтХЭтХЪтХРтХЭ  тХЪтХРтХЭ    тХЪтХРтХРтХРтХРтХРтХРтХЭ   тХЪтХРтХЭ   </text>
      <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.09; 0.10; 0.95; 0.96; 1" dur="20s" repeatCount="indefinite"/>
