      <text y="260" font-weight="bold">
        <tspan fill="#3776AB">[Python]</tspan>  <tspan fill="#f89820">[Java]</tspan>  <tspan fill="#f7df1e">[JavaScript]</tspan>  <tspan fill="#e34f26">[HTML5]</tspan>  <tspan fill="#1572B6">[CSS]</tspan>  <tspan fill="#A8B9CC">[C]</tspan>
      </text>
